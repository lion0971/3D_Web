<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>Three.js 數位分身 - 內建 AO 自動化方案</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        button {
            display: block;
            margin-bottom: 8px;
            padding: 8px 15px;
            cursor: pointer;
            background: #fff;
            border: none;
            border-radius: 4px;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background: #ddd;
        }

        label {
            color: white;
            font-size: 12px;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div id="ui">
        <button onclick="changeWallColor(0xffffff)">白色牆面</button>
        <button onclick="changeWallColor(0x3498db)">藍色牆面</button>
        <button onclick="changeWallColor(0xe74c3c)">紅色牆面</button>
        
        <label>陰影強度控制</label>
        <input type="range" min="0" max="3" step="0.1" value="1" style="width:100%" oninput="adjustShadow(this.value)">
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js",
            "three/examples/jsm/loaders/EXRLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/EXRLoader.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';
        import { EXRLoader } from 'three/examples/jsm/loaders/EXRLoader';

        // ===== 1. 初始化場景與渲染器 =====
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // ===== 2. 載入環境光 (HDRI) =====
        new EXRLoader().load('./hdri/studio.exr', (hdrTexture) => {
            const pmrem = new THREE.PMREMGenerator(renderer);
            const envMap = pmrem.fromEquirectangular(hdrTexture).texture;
            scene.environment = envMap;
            scene.background = new THREE.Color(0x222222); // 設定暗色背景突顯模型
            hdrTexture.dispose();
            pmrem.dispose();
        });

        // ===== 3. 全域變數 (按鈕橋樑) =====
        let wallMaterial = null; 

        // ===== 4. 模型載入 (關鍵修正區) =====
        const loader = new GLTFLoader();

        // 🟢 請確保此路徑指向你最新的、接好 glTF Output 的檔案
        loader.load('./models/20260228cad-3d-gltf.glb', (gltf) => {
            const model = gltf.scene;

            model.traverse((mesh) => {
                if (!mesh.isMesh) return;

                const mat = mesh.material;

                // 💡 賦值給 wallMaterial (假設你要控制的物件包含牆)
                // 如果你想一次控制全場景，這裡可以不寫條件
                if (mesh.name.toLowerCase().includes("wall") || mesh.name.includes("牆")) {
                    wallMaterial = mat;
                } else if (!wallMaterial) {
                    // 如果名字對不上，保險起見把第一個遇到的材質先存起來
                    wallMaterial = mat;
                }

                // 💡 處理 AO 貼圖 (從 glTF Material Output 自動帶入的圖)
                if (mat.aoMap) {
                    console.log(`✅ 成功在物件 ${mesh.name} 偵測到內建 AO`);
                    mat.aoMap.channel = 1;      // 強制讀取 uv2 (TEXCOORD_1)
                    mat.aoMapIntensity = 1.0;   // 預設強度
                    mat.aoMap.flipY = false;    // GLB 內部貼圖不翻轉
                }

                // 💡 修正 UV2 屬性 (如果模型漏掉 uv2，就把 uv1 複製過去)
                if (!mesh.geometry.attributes.uv2 && mesh.geometry.attributes.uv1) {
                    mesh.geometry.setAttribute('uv2', mesh.geometry.attributes.uv1);
                }

                mat.needsUpdate = true;
            });

            // 置中模型
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            
            scene.add(model);
            console.log("模型載入成功！");
        });

        // ===== 5. 互動功能 (Expose to window) =====
        window.changeWallColor = (colorHex) => {
            if (wallMaterial) {
                wallMaterial.color.setHex(colorHex);
            } else {
                console.warn("尚未抓取到材質，請稍候再試");
            }
        };

        window.adjustShadow = (intensity) => {
            scene.traverse((node) => {
                if (node.isMesh && node.material.aoMap) {
                    node.material.aoMapIntensity = parseFloat(intensity);
                }
            });
        };

        // ===== 6. 渲染循環 =====
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 響應視窗大小
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
