<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>Three.js AO 正確示範</title>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>

<body>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
        "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

// ===== 場景 =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

// ===== 相機 =====
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(5, 5, 5);

// ===== Renderer =====
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ===== 光 =====
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // ❗降低
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

// ===== 控制 =====
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ===== AO Texture =====
const textureLoader = new THREE.TextureLoader();
const aoMap = textureLoader.load('./Ao_Bake_Final.png');

// 🔴 關鍵設定
aoMap.flipY = false;
aoMap.colorSpace = THREE.NoColorSpace; // ❗AO 必須 linear

// ===== 載入模型 =====
const loader = new GLTFLoader();

loader.load('./models/20260228cad-3d.glb', (gltf) => {

    const model = gltf.scene;

    model.traverse((mesh) => {

        if (!mesh.isMesh) return;

        const geo = mesh.geometry;

        // ===== UV2 修正（最關鍵）=====
        if (geo.attributes.uv1) {
            geo.setAttribute('uv2', geo.attributes.uv1);
            console.log(`✅ ${mesh.name} 使用 uv1 → uv2`);
        }
        else if (!geo.attributes.uv2 && geo.attributes.uv) {
            // fallback（如果根本沒第二組）
            geo.setAttribute('uv2', geo.attributes.uv);
            console.warn(`⚠️ ${mesh.name} 用 uv 當 uv2`);
        }

        // ===== 材質設定 =====
        const mat = mesh.material;

        mat.aoMap = aoMap;
        mat.aoMapIntensity = 1; // 可微調

        // ❗確保是 PBR 材質
        if (!(mat instanceof THREE.MeshStandardMaterial)) {
            mesh.material = new THREE.MeshStandardMaterial({
                map: mat.map || null,
                aoMap: aoMap,
                aoMapIntensity: 1.2
            });
        }

        mesh.material.needsUpdate = true;
    });

    // 置中
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    scene.add(model);
});

// ===== 渲染 =====
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

animate();

// ===== resize =====
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
