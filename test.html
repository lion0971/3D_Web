<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>Succuleaf 數位分身 - 質感修復版</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 1;
      transform: scale(1);
    }

    #loading-screen.fade-out {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .loader-container {
      text-align: center;
      font-family: '微軟正黑體', sans-serif;
    }

    .leaf-icon {
      font-size: 50px;
      margin-bottom: 20px;
      animation: leaf-bounce 1.5s infinite ease-in-out;
    }

    @keyframes leaf-bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-15px);
      }
    }

    .progress-wrapper {
      width: 250px;
      height: 6px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px auto;
    }

    #loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #76b852, #8DC26F);
      box-shadow: 0 0 10px rgba(118, 184, 82, 0.5);
      transition: width 0.4s ease;
    }

    #loader-text {
      color: #8DC26F;
      font-size: 14px;
      letter-spacing: 1px;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      margin: -10px 0 0 -10px;
      pointer-events: none;
      z-index: 100;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 1px;
    }

    #crosshair::before {
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      margin-top: -1px;
    }

    #crosshair::after {
      left: 50%;
      top: 0;
      height: 100%;
      width: 2px;
      margin-left: -1px;
    }

    #instructions {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 5px;
      font-family: sans-serif;
      pointer-events: none;
      z-index: 50;
    }

    .door-label {
      color: #00ffcc;
      font-family: sans-serif;
      padding: 5px 15px;
      background: rgba(0, 40, 40, 0.6);
      border: 1px solid #00ffcc;
      border-radius: 4px;
      font-size: 14px;
      pointer-events: none;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
      animation: breathe 2s infinite ease-in-out;
      transition: opacity 0.3s ease;
      opacity: 0;
    }

    @keyframes breathe {

      0%,
      100% {
        box-shadow: 0 0 5px #00ffcc;
      }

      50% {
        box-shadow: 0 0 20px #00ffcc;
      }
    }
  </style>
</head>

<body>
  <div id="loading-screen">
    <div class="loader-container">
      <div class="leaf-icon">🌿</div>
      <div class="progress-wrapper">
        <div id="loader-bar"></div>
      </div>
      <div id="loader-text">正在組裝... 0%</div>
    </div>
  </div>
  <div id="crosshair"></div>
  <div id="instructions">👉 點擊畫面開始步入<br>W/A/S/D：行走 滑鼠：轉向 | 點擊門：開關門</div>

  <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/DRACOLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/DRACOLoader.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/loaders/EXRLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/EXRLoader.js",
            "three/examples/jsm/controls/PointerLockControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js",
            "three/examples/jsm/renderers/CSS2DRenderer": "https://unpkg.com/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js"
        }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
    import { EXRLoader } from 'three/examples/jsm/loaders/EXRLoader';
    import { PointerLockControls } from 'three/examples/jsm/controls/PointerLockControls';
    import { CSS2DRenderer, CSS2DObject } from 'three/examples/jsm/renderers/CSS2DRenderer';
    import { DRACOLoader } from 'three/examples/jsm/loaders/DRACOLoader';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(20, 1.5, 4);
    camera.lookAt(0, 1.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.3; // 提升亮度追上 PlayCanvas
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
    sunLight.position.set(15, 15, 0);
    scene.add(sunLight);

    const manager = new THREE.LoadingManager();
    const loaderBar = document.getElementById('loader-bar');
    const loaderText = document.getElementById('loader-text');
    const loadingScreen = document.getElementById('loading-screen');

    new EXRLoader(manager).load('hdri/studio.exr', (hdr) => {
      hdr.mapping = THREE.EquirectangularReflectionMapping;
      scene.environment = hdr;
      scene.environmentIntensity = 4.5;
    });

    // 1. 調整環境光與太陽光比例
    ambientLight.intensity = 0.05;    // 保持暗部夠深
    sunLight.intensity = 0.5;         // 壓低太陽，避免洗掉紋路

    renderer.toneMappingExposure = 1.5;

    const controls = new PointerLockControls(camera, renderer.domElement);
    renderer.domElement.addEventListener('click', () => controls.lock());
    scene.add(controls.getObject());

    let autoMoveSpeed = 0;
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    let prevTime = performance.now();

    document.addEventListener('keydown', (e) => {
      switch (e.code) {
        case 'KeyW': moveForward = true; break;
        case 'KeyA': moveLeft = true; break;
        case 'KeyS': moveBackward = true; break;
        case 'KeyD': moveRight = true; break;
      }
    });
    document.addEventListener('keyup', (e) => {
      switch (e.code) {
        case 'KeyW': moveForward = false; break;
        case 'KeyA': moveLeft = false; break;
        case 'KeyS': moveBackward = false; break;
        case 'KeyD': moveRight = false; break;
      }
    });

    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
    const loader = new GLTFLoader(manager);
    loader.setDRACOLoader(dracoLoader);

    const collidableObjects = [];
    const doorObjects = [];

    // --- 修正後的植物 LOD 邏輯 (保留原始材質貼圖) ---
    loader.load('models/Plant_Turtle_LOD.glb', (gltf) => {
      const modelScene = gltf.scene;
      const lod = new THREE.LOD();

      const createLODLevel = (namePrefix) => {
        const group = new THREE.Group();
        modelScene.traverse((node) => {
          if (node.isMesh && node.name.startsWith(namePrefix)) {
            const cloned = node.clone();

            // 1. 🌿 針對植物葉子與莖 (解決你看到的紅色法線反面問題)
            if (node.name.toLowerCase().includes('leaf') || node.name.toLowerCase().includes('plant')) {
              cloned.material = node.material.clone(); // 複製材質避免影響其他物件
              cloned.material.side = THREE.DoubleSide; // ✨ 強制雙面渲染，解決法線反面變透明
              cloned.material.shadowSide = THREE.DoubleSide; // 讓背面也能投射陰影
              cloned.material.roughness = 0.6; // 稍微調高粗糙度，讓葉子看起來更自然
            }

            // 💡 僅針對花盆 (_1) 找回 PlayCanvas 的質感細節，不覆蓋整個材質
            if (node.name.includes('Vase') || node.name.endsWith('_1')) {
              cloned.material = node.material.clone(); // 建議 clone 一份才不會改到其他物件
              cloned.material.metalness = 0.7;         // 增加反射能量
              cloned.material.roughness = 0.005;       // 讓反光極度銳利
              cloned.material.flatShading = true;      // 確保稜角在
              cloned.material.side = THREE.DoubleSide; // 解決你提到的法線問題
              cloned.material.needsUpdate = true;
            }
            cloned.material.needsUpdate = true;
            group.add(cloned);
          }
        });
        return group;
      };

      lod.addLevel(createLODLevel('Plant_Turtle_LOD_High'), 0);
      lod.addLevel(createLODLevel('Plant_Turtle_LOD_Mid'), 15);
      lod.addLevel(createLODLevel('Plant_Turtle_LOD_Low'), 40);

      const cameraDirection = new THREE.Vector3();
      camera.getWorldDirection(cameraDirection);
      lod.position.copy(camera.position.clone().add(cameraDirection.multiplyScalar(5)));
      lod.lookAt(camera.position);
      scene.add(lod);
    });

    // --- 完整還原建築邏輯 (牆壁碰撞、門) ---
    loader.load('models/20260228cad-3d-gltf.glb', (gltf) => {
      const model = gltf.scene;
      const roomData = { "in_door1": "會議室 101", "in_door2": "會議室 102", "in_door3": "茶水間" };

      model.traverse((mesh) => {
        if (!mesh.isMesh) return;
        const name = mesh.name.toLowerCase();

        // 還原正確的碰撞判定
        if (name.includes("wall") || (name.includes("door") && !name.includes("locker"))) {
          if (!name.includes("floor") && !name.includes("ground")) {
            collidableObjects.push(mesh);
          }
        }
        if (name.includes("door") || mesh.name.includes("門")) {
          doorObjects.push(mesh);
          mesh.userData.isOpen = false;
        }
        if (roomData[mesh.name]) {
          const div = document.createElement('div');
          div.className = 'door-label';
          div.textContent = roomData[mesh.name];
          mesh.userData.labelDiv = div;
          mesh.userData.roomName = roomData[mesh.name];
          const label = new CSS2DObject(div);
          label.position.set(0, 2.2, 0);
          mesh.add(label);
        }
      });
      scene.add(model);
    }, (xhr) => {
      const percent = Math.round((xhr.loaded / xhr.total) * 100);
      loaderBar.style.width = percent + '%';
      loaderText.innerText = percent >= 100 ? `優化數據中...` : `載入數位分身... ${percent}%`;
    });

    manager.onLoad = () => {
      setTimeout(() => {
        loadingScreen.classList.add('fade-out');
        autoMoveSpeed = 2.5;
        setTimeout(() => { loadingScreen.style.display = 'none'; }, 1200);
      }, 1000);
    };

    const raycaster = new THREE.Raycaster();
    document.addEventListener('click', () => {
      if (!controls.isLocked) return;
      raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      const intersects = raycaster.intersectObjects(doorObjects);
      if (intersects.length > 0) {
        const door = intersects[0].object;
        door.userData.isOpen = !door.userData.isOpen;
        const openAngle = door.name === "out_door" ? -Math.PI / 2 : Math.PI / 2;
        door.rotation.y = door.userData.isOpen ? openAngle : 0;
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      const time = performance.now();
      const delta = (time - prevTime) / 1000;

      scene.traverse(obj => { if (obj.isLOD) obj.update(camera); });

      if (autoMoveSpeed > 0.01) {
        controls.moveForward(autoMoveSpeed * delta);
        autoMoveSpeed *= Math.pow(0.95, delta * 60);
      }

      if (controls.isLocked) {
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;
        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        const checkWall = (dirVector) => {
          const colRaycaster = new THREE.Raycaster();
          const worldDir = dirVector.clone().applyQuaternion(camera.quaternion);
          worldDir.y = 0; worldDir.normalize();
          colRaycaster.set(camera.position.clone().setY(camera.position.y - 0.8), worldDir);
          colRaycaster.far = 0.6;
          return colRaycaster.intersectObjects(collidableObjects).length > 0;
        };

        if (moveForward || moveBackward) {
          const moveDir = moveForward ? new THREE.Vector3(0, 0, -1) : new THREE.Vector3(0, 0, 1);
          if (checkWall(moveDir)) { velocity.z = 0; }
          else { velocity.z -= direction.z * 40.0 * delta; }
        }
        if (moveLeft || moveRight) {
          const moveDir = moveLeft ? new THREE.Vector3(-1, 0, 0) : new THREE.Vector3(1, 0, 0);
          if (checkWall(moveDir)) { velocity.x = 0; }
          else { velocity.x -= direction.x * 40.0 * delta; }
        }

        controls.moveForward(-velocity.z * delta);
        controls.moveRight(-velocity.x * delta);
      }

      doorObjects.forEach(door => {
        if (door.userData.labelDiv) {
          const dist = camera.position.distanceTo(door.getWorldPosition(new THREE.Vector3()));
          door.userData.labelDiv.style.opacity = 1.0 - THREE.MathUtils.smoothstep(dist, 5, 15);
          if (Math.random() > 0.99) {
            const temp = (24 + Math.random()).toFixed(1);
            door.userData.labelDiv.textContent = `${door.userData.roomName} (${temp}°C)`;
          }
        }
      });

      prevTime = time;
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>

</html>
