<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>Three.js 數位分身 - 完整修正版</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #121212;
      /* 深色背景更專業 */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      /* 最上層 */
      transition: opacity 0.8s ease-out;
      /* 消失時的平滑度 */
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1),
        transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 1;
      transform: scale(1);
    }

    /* 這是被 JS 加入的 Class */
    #loading-screen.fade-out {
      opacity: 0;
      transform: scale(1.05);
      /* 輕微放大，像是鏡頭推進去 */
      pointer-events: none;
      /* 點擊穿透 */
    }

    .loader-container {
      text-align: center;
      font-family: '微軟正黑體', sans-serif;
    }

    .leaf-icon {
      font-size: 50px;
      margin-bottom: 20px;
      animation: leaf-bounce 1.5s infinite ease-in-out;
    }

    /* 簡單的上下跳動動畫 */
    @keyframes leaf-bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-15px);
      }
    }

    .progress-wrapper {
      width: 250px;
      height: 6px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px auto;
    }

    #loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #76b852, #8DC26F);
      /* 多肉綠漸層 */
      box-shadow: 0 0 10px rgba(118, 184, 82, 0.5);
      transition: width 0.4s ease;
    }

    #loader-text {
      color: #8DC26F;
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* 🟢 十字準心 */
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      margin-left: -10px;
      margin-top: -10px;
      pointer-events: none;
      z-index: 100;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 1px;
    }

    #crosshair::before {
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      margin-top: -1px;
    }

    #crosshair::after {
      left: 50%;
      top: 0;
      height: 100%;
      width: 2px;
      margin-left: -1px;
    }

    /* 🟢 指令提示 */
    #instructions {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 5px;
      font-family: sans-serif;
      pointer-events: none;
      z-index: 50;
    }

    /* 🟢 標籤樣式 (含平滑淡出過渡) */
    .door-label {
      color: #00ffcc;
      font-family: sans-serif;
      padding: 5px 15px;
      background: rgba(0, 40, 40, 0.6);
      border: 1px solid #00ffcc;
      border-radius: 4px;
      font-size: 14px;
      pointer-events: none;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
      animation: breathe 2s infinite ease-in-out;
      transition: opacity 0.3s ease;
      opacity: 0;
      /* 預設值 */
    }

    @keyframes breathe {

      0%,
      100% {
        box-shadow: 0 0 5px #00ffcc;
      }

      50% {
        box-shadow: 0 0 20px #00ffcc;
      }
    }
  </style>
</head>

<body>

  <div id="loading-screen">
    <div class="loader-container">
      <div class="leaf-icon">🌿</div>
      <div class="progress-wrapper">
        <div id="loader-bar"></div>
      </div>
      <div id="loader-text">正在組裝... 0%</div>
    </div>
  </div>

  <div id="crosshair"></div>
  <div id="instructions">
    👉 點擊畫面開始步入<br>
    W/A/S/D：行走 滑鼠：轉向 | 點擊門：開關門
  </div>

  <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/loaders/EXRLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/EXRLoader.js",
            "three/examples/jsm/controls/PointerLockControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js",
            "three/examples/jsm/renderers/CSS2DRenderer": "https://unpkg.com/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js"
        }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
    import { EXRLoader } from 'three/examples/jsm/loaders/EXRLoader';
    import { PointerLockControls } from 'three/examples/jsm/controls/PointerLockControls';
    import { CSS2DRenderer, CSS2DObject } from 'three/examples/jsm/renderers/CSS2DRenderer';

    // ===== 1. 基礎設定 =====
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(20, 1.6, 4);
    camera.lookAt(0, 1.6, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    // 1. 設定 ToneMapping 類型
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    // 2. 調整曝光數值 (預設為 1，視場景亮度可調至 1.2 ~ 1.5)九曝光補償
    renderer.toneMappingExposure = 1.0;
    // 3. 確保色彩空間正確（現代 Three.js 必備）
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    // ===== 2. 控制器與變數 =====
    const controls = new PointerLockControls(camera, renderer.domElement);
    const instructions = document.getElementById('instructions');
    renderer.domElement.addEventListener('click', () => controls.lock());
    scene.add(controls.getObject());

    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    let prevTime = performance.now();

    const onKeyDown = (e) => {
      switch (e.code) {
        case 'KeyW': moveForward = true; break;
        case 'KeyA': moveLeft = true; break;
        case 'KeyS': moveBackward = true; break;
        case 'KeyD': moveRight = true; break;
      }
    };
    const onKeyUp = (e) => {
      switch (e.code) {
        case 'KeyW': moveForward = false; break;
        case 'KeyA': moveLeft = false; break;
        case 'KeyS': moveBackward = false; break;
        case 'KeyD': moveRight = false; break;
      }
    };
    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);

    // ===== 3. 模型載入與邏輯函數 =====
    const collidableObjects = [];
    const doorObjects = [];

    function createDoorLabel(mesh, text) {
      const div = document.createElement('div');
      div.className = 'door-label';
      div.textContent = text;
      mesh.userData.labelDiv = div;
      mesh.userData.roomName = text.split(' (')[0];
      const label = new CSS2DObject(div);
      label.position.set(0, 2.2, 0);
      mesh.add(label);
    }

    // --- Loading 核心邏輯 ---
    const loadingScreen = document.getElementById('loading-screen');
    const loaderBar = document.getElementById('loader-bar');
    const loaderText = document.getElementById('loader-text');

    const manager = new THREE.LoadingManager();

    // 🟢 最終轉場：當所有資源 (HDR + GLB) 都解析完畢後執行
    manager.onLoad = function () {
      loaderBar.style.width = '100%';
      loaderText.innerText = '準備就緒！';

      // 使用 requestAnimationFrame 確保瀏覽器先渲染出 100% 的樣子
      requestAnimationFrame(() => {
        setTimeout(() => {
          loadingScreen.classList.add('fade-out');
          setTimeout(() => {
            loadingScreen.style.display = 'none';
          }, 1200);
        }, 300);
      });
    };

    // 載入 HDR
    new EXRLoader(manager).load('hdri/studio.exr', (hdr) => {
      const pmrem = new THREE.PMREMGenerator(renderer);
      scene.environment = pmrem.fromEquirectangular(hdr).texture;
      pmrem.dispose();
    });

    // 載入模型 (只呼叫這一次)
    const loader = new GLTFLoader(manager);
    loader.load(
      'models/20260228cad-3d-gltf.glb',
      (gltf) => {
        const model = gltf.scene;
        const roomData = {
          "in_door1": "會議室 101 (24.5°C)",
          "in_door2": "會議室 102 (24.3°C)",
          "in_door3": "茶水間 (22.0°C)"
        };

        model.traverse((mesh) => {
          if (!mesh.isMesh) return;
          const name = mesh.name.toLowerCase();

          // 碰撞與門邏輯
          if (name.includes("wall") || (name.includes("door") && !name.includes("locker"))) {
            if (!name.includes("floor") && !name.includes("ground")) {
              collidableObjects.push(mesh);
            }
          }
          if (name.includes("door") || mesh.name.includes("門")) {
            doorObjects.push(mesh);
            mesh.userData.isOpen = false;
          }
          if (roomData[mesh.name]) {
            createDoorLabel(mesh, roomData[mesh.name]);
          }

          if (mesh.material.aoMap) {
            mesh.material.aoMap.channel = 1;
            mesh.material.aoMap.flipY = false;
          }
        });

        scene.add(model);
        // 預熱渲染：在黑屏消失前強制 GPU 繪製一次，載入完趁遮蓋還在時畫第一次，撤掉遮蓋（畫面已經在那裡等你了，完美銜接）
        console.time("GPU暖機時間");
        renderer.render(scene, camera);
        console.timeEnd("GPU暖機時間");
      },
      (xhr) => {
        if (xhr.lengthComputable) {
          const percent = Math.round((xhr.loaded / xhr.total) * 100);
          if (percent < 100) {
            loaderBar.style.width = percent + '%';
            loaderText.innerText = `正在載入數位分身... ${percent}%`;
          }
        }
      }
    );

    // ===== 4. 互動與動畫迴圈 =====
    const raycaster = new THREE.Raycaster();
    document.addEventListener('click', () => {
      if (!controls.isLocked) return;
      raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      const intersects = raycaster.intersectObjects(doorObjects);
      if (intersects.length > 0) {
        const door = intersects[0].object;
        door.userData.isOpen = !door.userData.isOpen;
        const openAngle = door.name === "out_door" ? -Math.PI / 2 : Math.PI / 2;
        door.rotation.y = door.userData.isOpen ? openAngle : 0;
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      const time = performance.now();

      if (controls.isLocked) {
        const delta = (time - prevTime) / 1000;
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;

        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        // 碰撞偵測
        const colRaycaster = new THREE.Raycaster();
        const checkWall = (dirVec) => {
          colRaycaster.set(camera.position.clone().setY(camera.position.y - 0.8), dirVec.applyQuaternion(camera.quaternion).setY(0).normalize());
          colRaycaster.far = 0.6;
          return colRaycaster.intersectObjects(collidableObjects).length > 0;
        };

        if (moveForward && !checkWall(new THREE.Vector3(0, 0, -1))) velocity.z -= 30.0 * delta;
        if (moveBackward && !checkWall(new THREE.Vector3(0, 0, 1))) velocity.z += 30.0 * delta;
        if (moveLeft && !checkWall(new THREE.Vector3(-1, 0, 0))) velocity.x -= 30.0 * delta;
        if (moveRight && !checkWall(new THREE.Vector3(1, 0, 0))) velocity.x += 30.0 * delta;

        controls.moveForward(-velocity.z * delta);
        controls.moveRight(-velocity.x * delta);

        // 標籤淡出與溫度模擬
        doorObjects.forEach((door) => {
          if (door.userData.labelDiv) {
            const doorPos = new THREE.Vector3();
            door.getWorldPosition(doorPos);
            const dist = camera.position.distanceTo(doorPos);
            door.userData.labelDiv.style.opacity = 1.0 - THREE.MathUtils.smoothstep(dist, 5, 15);

            if (Math.random() > 0.99) {
              const temp = (24 + Math.random()).toFixed(1);
              door.userData.labelDiv.textContent = `${door.userData.roomName} (${temp}°C)`;
            }
          }
        });
      }
      prevTime = time;
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>

</html>
