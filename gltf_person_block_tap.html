<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>Three.js 數位分身 - 完整修正版</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }

    /* 🟢 十字準心 */
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      margin-left: -10px;
      margin-top: -10px;
      pointer-events: none;
      z-index: 100;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 1px;
    }

    #crosshair::before {
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      margin-top: -1px;
    }

    #crosshair::after {
      left: 50%;
      top: 0;
      height: 100%;
      width: 2px;
      margin-left: -1px;
    }

    /* 🟢 指令提示 */
    #instructions {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 5px;
      font-family: sans-serif;
      pointer-events: none;
      z-index: 50;
    }

    /* 🟢 標籤樣式 (含平滑淡出過渡) */
    .door-label {
      color: #00ffcc;
      font-family: sans-serif;
      padding: 5px 15px;
      background: rgba(0, 40, 40, 0.6);
      border: 1px solid #00ffcc;
      border-radius: 4px;
      font-size: 14px;
      pointer-events: none;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
      animation: breathe 2s infinite ease-in-out;
      transition: opacity 0.3s ease;
      opacity: 0;
      /* 預設值 */
    }

    @keyframes breathe {

      0%,
      100% {
        box-shadow: 0 0 5px #00ffcc;
      }

      50% {
        box-shadow: 0 0 20px #00ffcc;
      }
    }
  </style>
</head>

<body>
  <div id="crosshair"></div>
  <div id="instructions">
    👉 點擊畫面開始步入<br>
    W/A/S/D：行走 | 滑鼠：轉向 | 點擊門：開關門
  </div>

  <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/loaders/EXRLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/EXRLoader.js",
            "three/examples/jsm/controls/PointerLockControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js",
            "three/examples/jsm/renderers/CSS2DRenderer": "https://unpkg.com/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js"
        }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
    import { EXRLoader } from 'three/examples/jsm/loaders/EXRLoader';
    import { PointerLockControls } from 'three/examples/jsm/controls/PointerLockControls';
    import { CSS2DRenderer, CSS2DObject } from 'three/examples/jsm/renderers/CSS2DRenderer';

    // ===== 1. 基礎設定 =====
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    window.camera = camera;
    camera.position.set(20, 1.6, 4);
    camera.lookAt(0, 1.6, 0);       // 看向門的方向

    const renderer = new THREE.WebGLRenderer({
      antialias: true
      //,alpha: true       // 讓背景變透明（可以看到 HTML 的背景）
      //,precision: "highp"  // 使用高精度運算
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    //renderer.toneMappingExposure = 1.0; // 配合ACESFilmicToneMapping，數值越大，畫面越亮
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    // ===== 2. 控制器與變數 =====
    const controls = new PointerLockControls(camera, renderer.domElement);
    const instructions = document.getElementById('instructions');
    renderer.domElement.addEventListener('click', () => controls.lock());
    controls.addEventListener('lock', () => instructions.style.display = 'none');
    controls.addEventListener('unlock', () => instructions.style.display = 'block');
    scene.add(controls.getObject());

    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    let prevTime = performance.now();

    const onKeyDown = (e) => {
      switch (e.code) {
        case 'KeyW': moveForward = true; break;
        case 'KeyA': moveLeft = true; break;
        case 'KeyS': moveBackward = true; break;
        case 'KeyD': moveRight = true; break;
      }
    };
    const onKeyUp = (e) => {
      switch (e.code) {
        case 'KeyW': moveForward = false; break;
        case 'KeyA': moveLeft = false; break;
        case 'KeyS': moveBackward = false; break;
        case 'KeyD': moveRight = false; break;
      }
    };
    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);

    // ===== 3. 模型載入標籤變數 =====
    const collidableObjects = [];
    const doorObjects = [];
    let roomLabelDiv = null;
    let targetDoorMesh = null;

    function createDoorLabel(mesh, text) {
      const div = document.createElement('div');
      div.className = 'door-label';
      div.textContent = text;

      // 🟢 關鍵：把 div 存進 mesh 自己的資料夾，這樣每扇門都有自己的引用
      mesh.userData.labelDiv = div;
      // 🟢 存入原始房間名稱，方便之後更新溫度時調用
      mesh.userData.roomName = text.split(' (')[0];

      const label = new CSS2DObject(div);
      label.position.set(0, 2.2, 0);
      mesh.add(label);
    }

    //HDR 環境照明，基於圖像的照明（IBL, Image-Based Lighting） 技術
    new EXRLoader().load('hdri/studio.exr', (hdr) => {
      const pmrem = new THREE.PMREMGenerator(renderer);
      scene.environment = pmrem.fromEquirectangular(hdr).texture;
      pmrem.dispose();
    });

    const loader = new GLTFLoader();
    loader.load('models/20260228cad-3d-gltf.glb', (gltf) => {
      gltf.scene.traverse((mesh) => {
        if (!mesh.isMesh) return;
        const name = mesh.name.toLowerCase();

        // 碰撞偵測清單 (避開天花板、地板)
        if (name.includes("wall") || (name.includes("door") && !name.includes("locker"))) {
          if (!name.includes("floor") && !name.includes("ground")) {
            collidableObjects.push(mesh);
          }
        }
        // 門互動清單
        if (name.includes("door") || mesh.name.includes("門")) {
          doorObjects.push(mesh);
          mesh.userData.isOpen = false;
        }
        // 會議室標籤掛載
        // 1. 先定義好房間資料 (這以後甚至可以從 API 或 Excel 讀取)
        const roomData = {
          "in_door1": "會議室 101 (24.5°C)",
          "in_door2": "會議室 102 (24.3°C)",
          "in_door3": "茶水間 (22.0°C)"
        };

        // 2. 在 traverse 裡面用一行搞定
        gltf.scene.traverse((mesh) => {
          if (!mesh.isMesh) return;

          // 檢查這個名字有沒有在我們的資料庫裡
          // 在你的 loader.load 遍歷中：
          if (roomData[mesh.name]) {
            createDoorLabel(mesh, roomData[mesh.name]);
            // 確保這扇有標籤的門在 doorObjects 清單中
            if (!doorObjects.includes(mesh)) doorObjects.push(mesh);
          }
        });
        /*if (mesh.name === "in_door1") {
          createDoorLabel(mesh, "會議室 101 (24.5°C)");
          targetDoorMesh = mesh;
        }*/

        // AO 修正
        if (mesh.material.aoMap) {
          mesh.material.aoMap.channel = 1;
          mesh.material.aoMap.flipY = false;
        }
      });
      scene.add(gltf.scene);
    });

    // ===== 4. 門互動邏輯 =====
    const raycaster = new THREE.Raycaster();
    document.addEventListener('click', () => {
      if (!controls.isLocked) return;
      raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      const intersects = raycaster.intersectObjects(doorObjects);
      if (intersects.length > 0) {
        const door = intersects[0].object;
        door.userData.isOpen = !door.userData.isOpen;
        const openAngle = door.name === "out_door" ? -Math.PI / 2 : Math.PI / 2;
        door.rotation.y = door.userData.isOpen ? openAngle : 0;
      }
    });

    // ===== 5. 核心循環 =====
    function animate() {
      requestAnimationFrame(animate);

      if (controls.isLocked) {
        const time = performance.now();
        const delta = (time - prevTime) / 1000;

        // 阻尼
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;

        // 計算方向
        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        // 🟢 智慧四向碰撞偵測 (防吸牆)
        let canMoveF = true, canMoveB = true, canMoveL = true, canMoveR = true;
        const colRaycaster = new THREE.Raycaster();
        const rot = new THREE.Euler(0, 0, 0, 'YXZ').setFromQuaternion(camera.quaternion);
        rot.x = 0; rot.z = 0; // 水平偵測

        const checkWall = (angle) => {
          const dir = new THREE.Vector3(0, 0, -1).applyEuler(rot).applyAxisAngle(new THREE.Vector3(0, 1, 0), angle);
          colRaycaster.set(camera.position.clone().setY(camera.position.y - 0.8), dir);
          colRaycaster.far = 0.6; // 偵測距離
          return colRaycaster.intersectObjects(collidableObjects).length > 0;
        };

        if (moveForward && checkWall(0)) canMoveF = false;
        if (moveBackward && checkWall(Math.PI)) canMoveB = false;
        if (moveLeft && checkWall(Math.PI / 2)) canMoveL = false;
        if (moveRight && checkWall(-Math.PI / 2)) canMoveR = false;

        // 更新速度
        if (moveForward && canMoveF) velocity.z -= direction.z * 30.0 * delta;
        if (moveBackward && canMoveB) velocity.z -= direction.z * 30.0 * delta;
        if (moveLeft && canMoveL) velocity.x -= direction.x * 30.0 * delta;
        if (moveRight && canMoveR) velocity.x -= direction.x * 30.0 * delta;

        controls.moveRight(-velocity.x * delta);
        controls.moveForward(-velocity.z * delta);

        // 🟢 標籤淡出邏輯
        // 🟢 簡化後的標籤淡出邏輯 (請取代掉原本那兩層 if)
        // 🟢 取代掉原本那段單一的標籤淡出邏輯
doorObjects.forEach((door) => {
  // 檢查這扇門有沒有標籤 (有些門可能沒在 roomData 裡)
  if (door.userData.labelDiv) {
    const doorPosition = new THREE.Vector3();
    door.getWorldPosition(doorPosition);
    const dist = camera.position.distanceTo(doorPosition);

    const minDistance = 5.0;   
    const maxDistance = 15.0;  // 稍微拉長，讓遠處的標籤也能看到一點

    // 計算透明度
    let opacity = 1.0 - THREE.MathUtils.smoothstep(dist, minDistance, maxDistance);
    door.userData.labelDiv.style.opacity = opacity;

    // 🟢 動態更新溫度：每扇門獨立更新
    if (opacity > 0.05 && Math.random() > 0.99) {
      const baseTemp = 24; // 或是針對不同房間設不同基準
      const currentTemp = (baseTemp + Math.random()).toFixed(1);
      const roomName = door.userData.roomName || "房間";
      
      // 更新這扇門專屬的標籤文字
      door.userData.labelDiv.textContent = `${roomName} (${currentTemp}°C)`;
    }
  }
});
        prevTime = time;
      }

      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>

</html>
