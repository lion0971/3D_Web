<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Three.js 數位分身 AO 修正方案</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">
        <button onclick="changeWallColor(0xffffff)">白色牆面</button>
        <button onclick="changeWallColor(0x3498db)">藍色牆面</button>
        <button onclick="changeWallColor(0xe74c3c)">紅色牆面</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js",
            "three/examples/jsm/loaders/EXRLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/EXRLoader.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';
        import { EXRLoader } from 'three/examples/jsm/loaders/EXRLoader';

        // ===== 初始化渲染器 =====
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // ===== 載入環境光 (HDRI) =====
        new EXRLoader().load('./hdri/studio.exr', (hdrTexture) => {
            const pmrem = new THREE.PMREMGenerator(renderer);
            const envMap = pmrem.fromEquirectangular(hdrTexture).texture;
            scene.environment = envMap;
            hdrTexture.dispose();
            pmrem.dispose();
        });

        // ===== 載入獨立的 AO 貼圖 =====
        const textureLoader = new THREE.TextureLoader();
        const aoMap = textureLoader.load('./textures/Ao_Bake_Final.png');
        aoMap.flipY = false; // 🟢 重要：GLB 座標通常不翻轉
        aoMap.colorSpace = THREE.NoColorSpace; // 🟢 AO 屬於數據非顏色
        aoMap.channel = 1; // 🟢 強制這張圖讀取 uv2 (Index 1)

        // ===== 載入 GLB 模型 =====
        const loader = new GLTFLoader();
        let wallMaterial = null;

        loader.load('./models/20260228cad-3d.glb', (gltf) => {
            const model = gltf.scene;

            model.traverse((mesh) => {
                if (mesh.isMesh) {
                    // 確保材質是 StandardMaterial
                    if (!mesh.material.isMeshStandardMaterial) {
                        mesh.material = new THREE.MeshStandardMaterial({
                            map: mesh.material.map,
                            color: mesh.material.color
                        });
                    }

                    // 檢查模型是否帶有第二套 UV (uv2)
                    if (!mesh.geometry.attributes.uv2 && mesh.geometry.attributes.uv1) {
                        // 有些插件匯出會叫 uv1，手動轉為 Three.js 認得的 uv2
                        mesh.geometry.setAttribute('uv2', mesh.geometry.attributes.uv1);
                    }

                    // 套用 AO 貼圖
                    mesh.material.aoMap = aoMap;
                    mesh.material.aoMapIntensity = 1.0;
                    
                    // 紀錄牆面材質方便換色 (假設牆面名稱包含 'wall')
                    if (mesh.name.toLowerCase().includes('wall')) {
                        wallMaterial = mesh.material;
                    }

                    mesh.material.needsUpdate = true;
                }
            });

            // 自動置中模型
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            scene.add(model);
        });

        // ===== 互動換色功能 =====
        window.changeWallColor = (colorHex) => {
            if (wallMaterial) {
                wallMaterial.color.setHex(colorHex);
            } else {
                console.warn("尚未找到牆面材質");
            }
        };

        // ===== 動態循環 =====
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 響應視窗大小
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
